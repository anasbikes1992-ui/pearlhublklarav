name: pearl_core
description: Shared core models, API client, and services for PearlHub apps.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  flutter_animate: ^4.5.0
  web_socket_channel: ^3.0.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
