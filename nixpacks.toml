[phases.setup]
nixPkgs = [
  "php84",
  "php84Extensions.pdo_mysql",
  "php84Extensions.redis",
  "php84Extensions.gd",
  "php84Extensions.zip",
  "php84Extensions.bcmath",
  "php84Extensions.intl",
  "php84Extensions.mbstring",
  "php84Extensions.xml",
  "php84Extensions.curl",
  "nodejs_22",
]

[phases.install]
cmds = [
  "if ! command -v composer >/dev/null 2>&1; then curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer; fi",
  "php /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction --no-progress",
  "npm ci --include=dev --ignore-scripts",
]

[phases.build]
cmds = [
  "npm run build",
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
